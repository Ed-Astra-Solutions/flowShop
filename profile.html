<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Account — Flow Hydration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@300;400;500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/pages.css" />
<link rel="stylesheet" href="assets/css/customerAuth.css" />
</head>
<body>
<div id="siteHeader"></div>

<main class="page-wrap">
  <span class="label" style="color: var(--muted);">— Account</span>
  <h1 class="page-title" id="greeting">Your <em>account.</em></h1>
  <p class="page-sub">Orders, addresses, and details — all in one place.</p>

  <div id="profileRoot"></div>
</main>

<div id="siteFooter"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/customerAuth.js"></script>
<script src="assets/js/common.js"></script>
<script>
  FlowSite.renderNav();
  FlowSite.renderFooter();

  const root = document.getElementById('profileRoot');

  if (!CustomerAuth.isLoggedIn()) {
    root.innerHTML = `<div class="empty-state"><h2>Sign in to continue</h2><p>We send order updates to your registered mobile.</p><button class="btn-primary" onclick="CustomerAuth.showModal(()=>location.reload())"><span>Sign in →</span></button></div>`;
  } else {
    init();
  }

  let activeTab = location.hash.replace('#', '') || 'orders';

  async function init() {
    const customer = CustomerAuth.getCustomer() || {};
    document.getElementById('greeting').innerHTML = `Hello, <em>${(customer.name || 'friend').split(' ')[0]}.</em>`;

    root.innerHTML = `
      <div class="profile-grid">
        <aside class="profile-side">
          <ul>
            <li><a href="#orders" data-tab="orders" class="${activeTab === 'orders' ? 'active' : ''}">Orders</a></li>
            <li><a href="#addresses" data-tab="addresses" class="${activeTab === 'addresses' ? 'active' : ''}">Addresses</a></li>
            <li><a href="#details" data-tab="details" class="${activeTab === 'details' ? 'active' : ''}">My details</a></li>
            <li><a href="#" id="logoutBtn" style="color: var(--warn);">Log out</a></li>
          </ul>
        </aside>
        <section id="profileBody"></section>
      </div>
    `;

    document.querySelectorAll('[data-tab]').forEach(a => a.addEventListener('click', e => {
      e.preventDefault();
      activeTab = a.dataset.tab;
      location.hash = activeTab;
      document.querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === activeTab));
      renderTab();
    }));
    document.getElementById('logoutBtn').addEventListener('click', e => { e.preventDefault(); CustomerAuth.logout(); location.href = 'index.html'; });

    renderTab();
  }

  async function renderTab() {
    const body = document.getElementById('profileBody');
    body.innerHTML = `<div class="loading-state"><div class="spinner"></div><span>Loading…</span></div>`;
    try {
      if (activeTab === 'orders') return renderOrders(body);
      if (activeTab === 'addresses') return renderAddresses(body);
      if (activeTab === 'details') return renderDetails(body);
    } catch (err) {
      body.innerHTML = `<p style="color:var(--warn);">${err.message}</p>`;
    }
  }

  async function renderOrders(body) {
    const data = await FlowSite.api('/api/orders');
    const orders = data.orders || [];
    if (!orders.length) {
      body.innerHTML = `<div class="empty-state"><h2>No orders yet</h2><p>When you place one, it'll show here.</p><a href="shop.html" class="btn-primary"><span>Shop the line →</span></a></div>`;
      return;
    }
    body.innerHTML = orders.map(o => {
      const status = (o.paymentStatus === 'paid' || o.status === 'paid') ? 'paid' : (o.status === 'pending' ? 'pending' : '');
      return `<div class="order-card">
        <div class="head">
          <span class="num">${o.orderNumber || o._id}</span>
          <span class="status ${status}">${o.status || o.paymentStatus || 'placed'}</span>
        </div>
        <div style="color: var(--muted); font-size: 13px; margin-bottom: 12px;">${new Date(o.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })} · ${o.items?.length || 0} item${o.items?.length === 1 ? '' : 's'}</div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div style="font-size: 14px;">${(o.items || []).slice(0, 2).map(i => i.name + (i.flavour ? ` (${i.flavour})` : '') + ` × ${i.quantity}`).join(', ')}${o.items?.length > 2 ? ` +${o.items.length - 2} more` : ''}</div>
          <div style="font-family:'Fraunces',serif;font-size:22px;">${FlowSite.fmt(o.totalAmount || o.total || 0)}</div>
        </div>
      </div>`;
    }).join('');
  }

  async function renderAddresses(body) {
    const data = await FlowSite.api('/api/customer/addresses');
    const addrs = data.addresses || [];
    if (!addrs.length) {
      body.innerHTML = `<div class="empty-state"><h2>No saved addresses</h2><p>You can add one at checkout.</p></div>`;
      return;
    }
    body.innerHTML = addrs.map(a => `
      <div class="address-card">
        <div class="head">
          <span class="name">${a.label || a.type || 'Address'}</span>
          <span class="type">${a.type || 'home'}${a.isDefault ? ' · default' : ''}</span>
        </div>
        <div class="body">${[a.houseFloor, a.fullAddress || a.formattedAddress, a.landmark, a.city, a.state, a.pincode].filter(Boolean).join(', ')}</div>
      </div>
    `).join('');
  }

  async function renderDetails(body) {
    const c = CustomerAuth.getCustomer() || {};
    body.innerHTML = `
      <div class="form-section">
        <div class="field-row">
          <div class="field"><label>Full name</label><input id="dName" value="${c.name || ''}" /></div>
          <div class="field"><label>Mobile</label><input value="${c.mobile || ''}" disabled /></div>
        </div>
        <div class="field"><label>Email</label><input id="dEmail" type="email" value="${c.email || ''}" /></div>
        <button class="btn-primary" id="saveDetails"><span>Save changes</span></button>
      </div>
    `;
    document.getElementById('saveDetails').addEventListener('click', async () => {
      const name = document.getElementById('dName').value.trim();
      const email = document.getElementById('dEmail').value.trim();
      try {
        await CustomerAuth.updateProfile({ name, email });
        FlowSite.toast('Profile updated', { type: 'success' });
      } catch (err) {
        FlowSite.toast(err.message, { type: 'error' });
      }
    });
  }
</script>
</body>
</html>
