<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Order Confirmed — Flow Hydration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@300;400;500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/pages.css" />
<link rel="stylesheet" href="assets/css/customerAuth.css" />
</head>
<body>
<div id="siteHeader"></div>

<main class="page-wrap">
  <div class="success-card">
    <div class="icon">✓</div>
    <h2>Order <em class="italic">confirmed.</em></h2>
    <div class="order-num" id="orderNum">—</div>
    <p style="color: var(--muted); max-width: 480px; margin: 0 auto 32px;">We've received your payment. You'll get an order confirmation on WhatsApp and email shortly. Tracking link follows once it ships.</p>
    <div style="display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;">
      <a href="profile.html#orders" class="btn-primary"><span>View orders →</span></a>
      <a href="shop.html" class="btn-secondary">Continue shopping</a>
    </div>
  </div>
</main>

<div id="siteFooter"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/customerAuth.js"></script>
<script src="assets/js/common.js"></script>
<script>
  FlowSite.renderNav();
  FlowSite.renderFooter();
  const num = new URLSearchParams(location.search).get('order') || '';
  document.getElementById('orderNum').textContent = num ? `Order ${num}` : '';
</script>
</body>
</html>
