<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product — Flow Hydration</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=JetBrains+Mono:wght@300;400;500&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="assets/css/base.css" />
<link rel="stylesheet" href="assets/css/pages.css" />
<link rel="stylesheet" href="assets/css/customerAuth.css" />
</head>
<body>
<div id="siteHeader"></div>

<main id="pdRoot">
  <div class="loading-state"><div class="spinner"></div><span>Loading product…</span></div>
</main>

<div id="siteFooter"></div>

<script src="assets/js/config.js"></script>
<script src="assets/js/customerAuth.js"></script>
<script src="assets/js/common.js"></script>
<script>
  FlowSite.renderNav();
  FlowSite.renderFooter();

  const root = document.getElementById('pdRoot');
  const slug = new URLSearchParams(location.search).get('slug');

  if (!slug) {
    root.innerHTML = `<div class="empty-state"><h2>Pick a product</h2><p>Browse the collection to see details.</p><a href="shop.html" class="btn-primary"><span>Shop →</span></a></div>`;
  } else {
    loadProduct();
  }

  let product = null;
  let selectedPack = 0;
  let selectedFlavour = '';
  let qty = 1;

  async function loadProduct() {
    try {
      const res = await fetch(`${API_BASE}/api/products/${slug}`);
      const data = await res.json();
      product = data.data || data.product || data;
      if (!product?.slug) throw new Error('Not found');
      selectedFlavour = product.flavours?.[0] || '';
      render();
    } catch (err) {
      root.innerHTML = `<div class="empty-state"><h2>Product not found</h2><p>It may have been moved or sold out.</p><a href="shop.html" class="btn-primary"><span>Back to shop</span></a></div>`;
    }
  }

  function render() {
    const p = product;
    const packs = p.packSizes || [{ size: 'Default', price: 0 }];
    const pack = packs[selectedPack] || packs[0];
    const img = p.media?.find(m => m.type === 'image')?.url;
    const stars = '★★★★★'.slice(0, Math.round(p.rating || 5)) + '☆☆☆☆☆'.slice(0, 5 - Math.round(p.rating || 5));

    const reviewCount = p.reviewCount || (p.reviews || []).length || 234;
    const ratingNum = (p.rating || 4.9).toFixed(1);
    const defaultHighlights = [
      { title: 'Low Sugar', desc: 'Clean hydration' },
      { title: 'Instant Energy', desc: 'Fast absorption' },
      { title: 'Lab Tested', desc: 'Quality assured' }
    ];
    const highlights = (p.highlights?.length ? p.highlights : defaultHighlights).map(h =>
      typeof h === 'string' ? { title: h, desc: '' } : h
    );
    const defaultIngredients = [
      { name: 'Sodium', desc: 'Essential for fluid balance and nerve function. Helps replace electrolytes lost through sweat during physical activity.' },
      { name: 'Potassium', desc: 'Supports muscle function and heart health. Works with sodium to maintain proper cellular fluid balance.' },
      { name: 'Magnesium', desc: 'Crucial for energy production and muscle recovery. Helps reduce fatigue and supports over 300 enzymatic reactions.' },
      { name: 'Zinc', desc: 'Supports immune function and protein synthesis. Essential for athletic recovery and overall wellness.' }
    ];
    const ingredients = (p.ingredients?.length ? p.ingredients : defaultIngredients).map(i =>
      typeof i === 'string' ? { name: i, desc: '' } : i
    );

    root.innerHTML = `
      <section class="pd-grid">
        <div class="pd-gallery">
          ${img ? `<img src="${img}" alt="${p.name}" />` : `<div class="sachet ${FlowSite.sachetClass(p.slug, 0)}"></div>`}
        </div>
        <div class="pd-info">
          <div class="pd-cat label">${p.category || 'Hydration'}${p.tagline ? ` · ${p.tagline}` : ''}</div>
          <h1>${p.name.replace(/(\s\w+)$/, ' <em>$1</em>')}</h1>
          <p class="pd-tagline">${p.shortDescription || p.tagline || ''}</p>
          <div class="pd-rating"><span class="stars">${stars}</span><span class="count"><strong>${ratingNum}</strong> (${reviewCount} reviews)</span></div>

          ${p.flavours?.length ? `
          <div class="pd-section">
            <span class="label">Flavour: <strong>${selectedFlavour}</strong></span>
            <div class="pd-options" id="flavourOpts">
              ${p.flavours.map(f => `<button class="pd-option ${f === selectedFlavour ? 'selected' : ''}" data-flavour="${f}">${f}</button>`).join('')}
            </div>
          </div>` : ''}

          <div class="pd-section">
            <span class="label">Pack Size: <strong>${pack.size}${pack.sachets ? ` (${pack.sachets} Sachets)` : ''}</strong></span>
            <div class="pd-options" id="packOpts">
              ${packs.map((pk, i) => `<button class="pd-option pd-pack ${i === selectedPack ? 'selected' : ''}" data-pack="${i}">
                <span class="pack-name">${pk.size}${pk.sachets ? ` · ${pk.sachets} sticks` : ''}</span>
                <span class="pack-price">${pk.originalPrice && pk.originalPrice > pk.price ? `<s>${FlowSite.fmt(pk.originalPrice)}</s>` : ''}${FlowSite.fmt(pk.price)}</span>
              </button>`).join('')}
            </div>
          </div>

          <div class="pd-price-row">
            <div class="pd-price">${pack.originalPrice && pack.originalPrice > pack.price ? `<s>${FlowSite.fmt(pack.originalPrice)}</s>` : ''}${FlowSite.fmt(pack.price)}</div>
            ${pack.savings ? `<span class="pd-savings">${pack.savings}</span>` : ''}
          </div>

          <div class="pd-cta">
            <div class="pd-qty">
              <button id="qtyMinus" aria-label="Decrease">−</button>
              <span id="qtyVal">${qty}</span>
              <button id="qtyPlus" aria-label="Increase">+</button>
            </div>
            <button class="btn-primary" id="addToCart"><span>Add to Cart — ${FlowSite.fmt(pack.price)}</span></button>
          </div>
          <button class="btn-secondary pd-buynow" id="buyNow"><span>⚡ Buy Now</span></button>

          ${p.description ? `<p class="pd-description">${p.description}</p>` : ''}

          <div class="pd-highlights">
            ${highlights.map(h => `<div class="pd-highlight"><strong>${h.title}</strong>${h.desc ? `<span>${h.desc}</span>` : ''}</div>`).join('')}
          </div>

          <div class="pd-trust">
            <span class="trust-badge">🚚 Free shipping over ₹999</span>
            <span class="trust-badge">🔒 Secure checkout</span>
            <span class="trust-badge">🇮🇳 Made with love in India</span>
          </div>
        </div>
      </section>

      <section class="pd-tabs">
        <div class="tabs-header">
          <button class="tab-btn active" data-tab="ingredients">Ingredients</button>
          <button class="tab-btn" data-tab="how-to-use">How to Use</button>
          <button class="tab-btn" data-tab="reviews">Reviews</button>
        </div>

        <div class="tab-content active" id="tab-ingredients">
          <div class="ingredient-cards">
            ${ingredients.map(i => `<div class="ingredient-card"><h4>${i.name}</h4><p>${i.desc || ''}</p></div>`).join('')}
          </div>
        </div>

        <div class="tab-content" id="tab-how-to-use">
          <div class="ingredient-cards">
            <div class="ingredient-card"><div class="step-num">1</div><h4>Pour</h4><p>Empty one Flow sachet into 500ml (16oz) of cold water. Works with still or sparkling water.</p></div>
            <div class="ingredient-card"><div class="step-num">2</div><h4>Mix</h4><p>Stir or shake until fully dissolved. Our formula mixes instantly with no gritty texture.</p></div>
            <div class="ingredient-card"><div class="step-num">3</div><h4>Drink</h4><p>Enjoy anytime — morning, pre/post workout, or whenever you need optimal hydration.</p></div>
          </div>
        </div>

        <div class="tab-content" id="tab-reviews">
          <h3 class="reviews-title">Customer Reviews</h3>
          ${(p.reviews || []).length ? (p.reviews || []).slice(0, 8).map(r => `<div class="review">
            <div class="review-head"><span class="review-author">${r.author}${r.verified ? ' · ✓ Verified Purchase' : ''}</span><span class="review-meta">${new Date(r.date).toLocaleDateString('en-IN', { month: 'long', day: 'numeric', year: 'numeric' })}</span></div>
            <div class="review-rating">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</div>
            ${r.title ? `<h4 class="review-title">${r.title}</h4>` : ''}
            <p class="review-content">${r.content}</p>
          </div>`).join('') : `<p style="color:var(--muted);">No reviews yet. Be the first to share your Flow.</p>`}
        </div>
      </section>
    `;

    // Wire up
    document.getElementById('flavourOpts')?.addEventListener('click', e => {
      const btn = e.target.closest('[data-flavour]'); if (!btn) return;
      selectedFlavour = btn.dataset.flavour;
      document.querySelectorAll('#flavourOpts .pd-option').forEach(b => b.classList.toggle('selected', b.dataset.flavour === selectedFlavour));
    });
    document.getElementById('packOpts').addEventListener('click', e => {
      const btn = e.target.closest('[data-pack]'); if (!btn) return;
      selectedPack = +btn.dataset.pack;
      render();
    });
    document.getElementById('qtyMinus').onclick = () => { qty = Math.max(1, qty - 1); document.getElementById('qtyVal').textContent = qty; };
    document.getElementById('qtyPlus').onclick = () => { qty = Math.min(99, qty + 1); document.getElementById('qtyVal').textContent = qty; };
    document.getElementById('addToCart').onclick = async () => {
      await CustomerAuth.addToCart({
        productId: p._id || p.slug,
        productSlug: p.slug,
        name: p.name,
        flavour: selectedFlavour,
        quantity: qty,
        price: pack.price,
        image: img || ''
      });
      FlowSite.updateCartCount();
      FlowSite.toast(`${p.name} added to cart`, { title: 'Added to cart', type: 'success' });
    };
    document.getElementById('buyNow').onclick = async () => {
      await CustomerAuth.addToCart({
        productId: p._id || p.slug,
        productSlug: p.slug,
        name: p.name,
        flavour: selectedFlavour,
        quantity: qty,
        price: pack.price,
        image: img || ''
      });
      location.href = 'checkout.html';
    };

    // Tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b === btn));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${tab}`));
      });
    });
  }
</script>
</body>
</html>
